<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LMS Insights</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="auth-bg">
    <div class="auth-card animate-fade-in mx-3">
        <div class="auth-header">
            <i class="fa-solid fa-graduation-cap fs-1 text-accent mb-2"></i>
            <h3 class="mb-0">LMS Activity Insights</h3>
            <small class="opacity-75">Sign in to your analytics workspace</small>
        </div>
        
        <div class="auth-body">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_username" class="form-label fw-medium"><i class="fa-solid fa-user me-2 text-secondary"></i>Username</label>
                    <input type="text" name="username" class="form-control" id="id_username" required placeholder="Enter username">
                </div>
                
                <div class="mb-4">
                    <label for="id_password" class="form-label fw-medium"><i class="fa-solid fa-lock me-2 text-secondary"></i>Password</label>
                    <input type="password" name="password" class="form-control" id="id_password" required placeholder="Enter password">
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2.5 fs-6 mb-3">
                    <i class="fa-solid fa-right-to-bracket me-2"></i>Login
                </button>
            </form>
            
            <div class="text-center mt-3">
                <span class="text-secondary">Don't have an account?</span>
                <a href="{% url 'register' %}" class="fw-semibold text-decoration-none" style="color: var(--cyprus);">Register here</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
